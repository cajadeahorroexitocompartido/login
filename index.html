<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Éxito Compartido — Acceso</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f4f6f8;--surface:#ffffff;--surface2:#f8f9fb;
  --border:#dde2e8;--border2:#eaedf1;
  --navy:#1a3a5c;--navy-dark:#12283f;--navy-soft:#eaf0f6;
  --text:#1c2530;--text2:#5b6776;--text3:#8a96a3;
  --red:#b3261e;--red-soft:#fbe9e7;
  --radius:8px;
}
html,body{min-height:100vh;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);font-size:14px}
.page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px 16px}
.card{width:100%;max-width:420px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:0 1px 3px rgba(16,24,32,.08)}
.card-top{padding:36px 32px 26px;text-align:center;background:var(--navy);border-bottom:3px solid var(--navy-dark)}
.logo{width:60px;height:60px;border-radius:6px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);display:inline-flex;align-items:center;justify-content:center;font-size:20px;font-weight:bold;color:#fff;margin-bottom:16px;letter-spacing:.5px}
.org-name{font-size:17px;font-weight:bold;color:#fff;line-height:1.35;margin-bottom:4px}
.org-tag{font-size:11px;font-weight:normal;color:#c4d2e0;text-transform:uppercase;letter-spacing:.08em}
.card-body{padding:28px 32px 32px}
.form-title{font-size:15px;font-weight:bold;margin-bottom:3px;color:var(--text)}
.form-sub{font-size:12px;color:var(--text3);margin-bottom:22px}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:bold;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
.input-wrap{position:relative}
.input-wrap input{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:11px 14px;border-radius:6px;font-size:13px;font-family:Arial,Helvetica,sans-serif;outline:none;-webkit-appearance:none;transition:border-color .15s}
.input-wrap input:focus{border-color:var(--navy);background:#fff}
.input-wrap input::placeholder{color:var(--text3)}
.toggle-pass{position:absolute;right:11px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);cursor:pointer;padding:4px;line-height:1;font-size:11px}
.toggle-pass:hover{color:var(--text2)}
.error-box{display:none;background:var(--red-soft);border:1px solid #f0c4c0;border-radius:6px;padding:10px 12px;font-size:12px;color:var(--red);margin-bottom:14px;align-items:center;gap:8px;line-height:1.4}
.error-box.show{display:flex}
.btn-login{width:100%;padding:12px;background:var(--navy);color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:bold;font-family:Arial,Helvetica,sans-serif;cursor:pointer;margin-top:6px;display:flex;align-items:center;justify-content:center;gap:8px;-webkit-appearance:none;transition:background .15s}
.btn-login:hover{background:var(--navy-dark)}
.btn-login.loading{opacity:.7;pointer-events:none}
.spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none}
.btn-login.loading .spinner{display:block}
.btn-login.loading .btn-txt{display:none}
@keyframes spin{to{transform:rotate(360deg)}}
.card-footer{padding:13px 32px;border-top:1px solid var(--border2);text-align:center;font-size:10px;color:var(--text3);line-height:1.6}
@media(max-width:480px){.card-top{padding:28px 22px 20px}.card-body{padding:22px 22px 26px}.card-footer{padding:11px 22px}}
</style>
</head>
<body>
<div class="page">
  <div class="card">
    <div class="card-top">
      <div class="logo">EC</div>
      <div class="org-name">Caja de Ahorro y Crédito<br>Éxito Compartido</div>
      <div class="org-tag">Sistema de gestión financiera</div>
    </div>
    <div class="card-body">
      <div class="form-title">Iniciar sesión</div>
      <div class="form-sub">Ingresa tus credenciales para continuar</div>
      <div class="error-box" id="error-box">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span id="error-msg">Correo o contraseña incorrectos.</span>
      </div>
      <div class="field">
        <label>Correo electrónico</label>
        <div class="input-wrap"><input type="email" id="inp-email" placeholder="tucorreo@email.com" autocomplete="email" inputmode="email"></div>
      </div>
      <div class="field">
        <label>Contraseña</label>
        <div class="input-wrap">
          <input type="password" id="inp-pass" placeholder="••••••••" autocomplete="current-password">
          <button class="toggle-pass" onclick="togglePass()" type="button"><span id="toggle-txt">Ver</span></button>
        </div>
      </div>
      <button class="btn-login" id="btn-login" onclick="doLogin()">
        <span class="btn-txt">Ingresar al sistema</span>
        <div class="spinner"></div>
      </button>
    </div>
    <div class="card-footer">Caja de Ahorro y Crédito Éxito Compartido &nbsp;·&nbsp; 2026<br>Solo personal autorizado</div>
  </div>
</div>
<script>
const API = 'https://script.google.com/macros/s/AKfycby-BrSpUIdQ_v08SYjsg7lFDcMCMxfgbqAjPIlfZZGFRVEoyyTHrRIzJmZFMoUIDAzTFw/exec';
function togglePass(){
  const inp = document.getElementById('inp-pass'), txt = document.getElementById('toggle-txt');
  const oculto = inp.type === 'password';
  inp.type = oculto ? 'text' : 'password';
  txt.textContent = oculto ? 'Ocultar' : 'Ver';
}
async function doLogin(){
  const email = document.getElementById('inp-email').value.trim().toLowerCase();
  const pass  = document.getElementById('inp-pass').value;
  const err   = document.getElementById('error-box');
  const btn   = document.getElementById('btn-login');
  err.classList.remove('show');
  if(!email || !pass){
    document.getElementById('error-msg').textContent = 'Completa el correo y la contraseña.';
    err.classList.add('show'); return;
  }
  btn.classList.add('loading');
  try{
    const r = await fetch(API, {method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({accion:'login',email,pass})});
    const j = await r.json();
    if(j.ok && j.data && j.data.ok){
      const u = j.data.usuario;
      const usuario = {id:u.id||u.ID||'',nombre:u.nombre||u.Nombre||email,rol:u.rol||u.Rol||'contador',email:u.email||u.Email||email};
      sessionStorage.setItem('ec_user', JSON.stringify(usuario));
      sessionStorage.setItem('ec_rol', usuario.rol);
      sessionStorage.setItem('api_url', API);
      window.location.href = 'dashboard.html';
    } else {
      try{
        const r2 = await fetch(`${API}?accion=leer&tab=usuarios`);
        const j2 = await r2.json();
        if(j2.ok && j2.data){
          const u = j2.data.find(x => String(x.Email||'').toLowerCase()===email && (x.Pass||'')===pass && String(x.Activo||'true').toLowerCase()!=='false');
          if(u){
            const usuario = {id:u.ID||'',nombre:u.Nombre||email,rol:u.Rol||'contador',email:u.Email||email};
            sessionStorage.setItem('ec_user', JSON.stringify(usuario));
            sessionStorage.setItem('ec_rol', usuario.rol);
            sessionStorage.setItem('api_url', API);
            window.location.href = 'dashboard.html';
            return;
          }
        }
      }catch(_){}
      document.getElementById('error-msg').textContent = (j.data && j.data.msg) ? j.data.msg : 'Correo o contraseña incorrectos.';
      err.classList.add('show');
      if(navigator.vibrate) navigator.vibrate([60,40,60]);
      btn.classList.remove('loading');
    }
  }catch(e){
    document.getElementById('error-msg').textContent = 'Error de conexión. Verifica tu internet.';
    err.classList.add('show');
    btn.classList.remove('loading');
  }
}
document.addEventListener('keydown', e => { if(e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
