<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caja de Ahorro y Crédito Éxito Compartido</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#000;--bg2:#0d0d0d;--bg3:#161616;--bg4:#1f1f1f;--green:#22c55e;--green2:#16a34a;--red:#ef4444;--text:#fff;--text2:#a3a3a3;--text3:#525252;--border:rgba(255,255,255,0.08);--radius:12px}
html,body{height:100%;font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px}
.bg-glow{position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 80% 50% at 50% -5%, rgba(34,197,94,0.09) 0%, transparent 70%)}
.page{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 16px}
.logo-wrap{text-align:center;margin-bottom:36px}
.logo-icon{width:68px;height:68px;border-radius:20px;background:var(--green);display:inline-flex;align-items:center;justify-content:center;font-size:26px;font-weight:700;color:#000;margin-bottom:18px;box-shadow:0 0 40px rgba(34,197,94,0.2)}
.logo-title{font-size:13px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:6px}
.logo-name{font-size:22px;font-weight:700;line-height:1.25;letter-spacing:-0.3px}
.logo-name span{color:var(--green)}
.logo-tag{display:inline-block;margin-top:12px;font-size:11px;font-weight:500;background:rgba(34,197,94,0.08);color:var(--green);border:1px solid rgba(34,197,94,0.18);padding:4px 14px;border-radius:20px;letter-spacing:0.06em;text-transform:uppercase}
.card{width:100%;max-width:400px;background:var(--bg2);border:1px solid var(--border);border-radius:20px;overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,0.5)}
.card-head{padding:22px 24px 18px;border-bottom:1px solid rgba(255,255,255,0.05)}
.card-head-title{font-size:16px;font-weight:600;margin-bottom:3px}
.card-head-sub{font-size:13px;color:var(--text3)}
.card-body{padding:24px}
.field{margin-bottom:16px}
.field label{display:block;font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:7px}
.input-wrap{position:relative}
.input-wrap .ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:18px;color:var(--text3);pointer-events:none}
.input-wrap input{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:13px 42px 13px 40px;border-radius:var(--radius);font-size:15px;font-family:'IBM Plex Sans',sans-serif;outline:none;transition:border-color .2s;-webkit-appearance:none}
.input-wrap input:focus{border-color:var(--green);background:var(--bg4)}
.input-wrap input::placeholder{color:var(--text3)}
.toggle-pass{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);cursor:pointer;font-size:19px;padding:4px;line-height:1}
.error-box{display:none;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.22);border-radius:var(--radius);padding:11px 14px;font-size:13px;color:var(--red);margin-bottom:16px;align-items:center;gap:8px;line-height:1.4}
.error-box.show{display:flex}
.btn-login{width:100%;padding:15px;background:var(--green);color:#000;border:none;border-radius:var(--radius);font-size:15px;font-weight:700;font-family:'IBM Plex Sans',sans-serif;cursor:pointer;transition:all .2s;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-login:hover{background:var(--green2)}
.btn-login.loading{opacity:.65;pointer-events:none}
.spinner{width:18px;height:18px;border:2px solid rgba(0,0,0,0.25);border-top-color:#000;border-radius:50%;animation:spin .7s linear infinite;display:none}
.btn-login.loading .spinner{display:block}
.btn-login.loading .lbl{display:none}
@keyframes spin{to{transform:rotate(360deg)}}
.footer{margin-top:28px;font-size:12px;color:var(--text3);text-align:center;line-height:1.7}
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="page">
  <div class="logo-wrap">
    <div class="logo-icon">EC</div>
    <div class="logo-title">Ingreso al portal</div>
    <div class="logo-name">Caja de Ahorro y Crédito<br><span>Éxito Compartido</span></div>
    <div class="logo-tag">Sistema de gestión financiera</div>
  </div>
  <div class="card">
    <div class="card-head">
      <div class="card-head-title">Iniciar sesión</div>
      <div class="card-head-sub">Ingresa tus credenciales para continuar</div>
    </div>
    <div class="card-body">
      <div class="error-box" id="error-box"><i class="ti ti-alert-circle"></i><span id="error-msg">Correo o contraseña incorrectos.</span></div>
      <div class="field">
        <label>Correo electrónico</label>
        <div class="input-wrap"><i class="ti ti-mail ico"></i><input type="email" id="inp-email" placeholder="tucorreo@email.com" autocomplete="email" inputmode="email"></div>
      </div>
      <div class="field">
        <label>Contraseña</label>
        <div class="input-wrap"><i class="ti ti-lock ico"></i><input type="password" id="inp-pass" placeholder="••••••••"><button class="toggle-pass" onclick="togglePass()" type="button"><i class="ti ti-eye" id="eye-icon"></i></button></div>
      </div>
      <button class="btn-login" id="btn-login" onclick="doLogin()">
        <span class="lbl"><i class="ti ti-login" style="font-size:18px"></i>Ingresar al sistema</span>
        <div class="spinner"></div>
      </button>
    </div>
  </div>
  <div class="footer">Caja de Ahorro y Crédito Éxito Compartido · 2026<br>Solo personal autorizado</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, query, where, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAh3p9Wx8LVGzt-sF4TnSmr75dzpRTek1Q",
  authDomain: "caja-de-ahorro-exito.firebaseapp.com",
  projectId: "caja-de-ahorro-exito",
  storageBucket: "caja-de-ahorro-exito.firebasestorage.app",
  messagingSenderId: "290669234871",
  appId: "1:290669234871:web:be3b083dc2c45e26475b32"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Crear usuarios iniciales si no existen
async function initUsuarios(){
  const snap = await getDocs(collection(db,'usuarios'));
  if(snap.empty){
    await addDoc(collection(db,'usuarios'),{nombre:'Administrador',email:'admin@exitocompartido.com',pass:'admin123',rol:'admin',activo:true});
    await addDoc(collection(db,'usuarios'),{nombre:'Contador Tesorero',email:'contador@exitocompartido.com',pass:'conta123',rol:'contador',activo:true});
  }
}
initUsuarios();

window.togglePass = function(){
  const i=document.getElementById('inp-pass'),ic=document.getElementById('eye-icon'),o=i.type==='password';
  i.type=o?'text':'password';ic.className=o?'ti ti-eye-off':'ti ti-eye';
};

window.doLogin = async function(){
  const email=document.getElementById('inp-email').value.trim().toLowerCase();
  const pass=document.getElementById('inp-pass').value;
  const err=document.getElementById('error-box');
  const btn=document.getElementById('btn-login');
  err.classList.remove('show');
  if(!email||!pass){document.getElementById('error-msg').textContent='Completa el correo y la contraseña.';err.classList.add('show');return;}
  btn.classList.add('loading');
  try{
    const q=query(collection(db,'usuarios'),where('email','==',email),where('activo','==',true));
    const snap=await getDocs(q);
    if(snap.empty||snap.docs[0].data().pass!==pass){
      document.getElementById('error-msg').textContent='Correo o contraseña incorrectos.';
      err.classList.add('show');if(navigator.vibrate)navigator.vibrate([60,40,60]);btn.classList.remove('loading');return;
    }
    const u=snap.docs[0].data();
    sessionStorage.setItem('ec_user',JSON.stringify({id:snap.docs[0].id,nombre:u.nombre,rol:u.rol,email:u.email}));
    window.location.href='panel_exito_compartido.html';
  }catch(e){
    document.getElementById('error-msg').textContent='Error de conexión: '+e.message;
    err.classList.add('show');btn.classList.remove('loading');
  }
};
document.addEventListener('keydown',e=>{if(e.key==='Enter')window.doLogin();});
</script>
</body>
</html>
